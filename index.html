<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Pedidos — Casa da Sogra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --y:#FFD000;
  --bg:#0A0A0A;
  --bg2:#111111;
  --bg3:#181818;
  --card:#0F0F0F;
  --border:rgba(255,208,0,0.1);
  --border2:rgba(255,208,0,0.22);
  --text:#EDEAE3;
  --muted:#5C5852;
  --muted2:#3A3835;
  --green:#1DB954;
  --orange:#FF8C00;
  --red:#EF4444;
  --blue:#3B82F6;
  --r:14px;
  --nav-h:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);font-size:16px}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100svh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}

/* ══ LOGIN SCREEN ══ */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;
}
.login-logo{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:2.4rem;color:var(--text);text-align:center;
  margin-bottom:4px;
}
.login-logo span{color:var(--y)}
.login-sub{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:44px}
.login-label{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:700;align-self:flex-start;width:100%;max-width:300px}
.login-pin-row{display:flex;gap:12px;margin-bottom:32px}
.pin-dot{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border2);background:transparent;transition:all .15s;
}
.pin-dot.filled{background:var(--y);border-color:var(--y)}
.pin-dot.err{background:var(--red);border-color:var(--red);animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  width:100%;max-width:300px;
}
.pkey{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:20px;
  font-size:1.35rem;font-weight:700;color:var(--text);
  cursor:pointer;transition:all .14s;border:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.pkey:active{background:rgba(255,208,0,.15);transform:scale(.92)}
.pkey.del{font-size:.95rem}

/* ══ NAV ══ */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:var(--nav-h);
  display:flex;align-items:center;
  padding:0 16px;
  gap:12px;
}
.nav-logo{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.2rem;flex:1}
.nav-logo span{color:var(--y)}
.nav-date{font-size:.62rem;color:var(--muted);letter-spacing:.06em}
.nav-live{
  display:flex;align-items:center;gap:5px;
  font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:var(--green);
}
.live-dot{
  width:6px;height:6px;background:var(--green);border-radius:50%;
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.nav-logout{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.8rem;padding:6px;-webkit-tap-highlight-color:transparent}
.nav-logout:active{color:var(--red)}

/* ══ STATS BAR ══ */
.statsbar{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.stat{
  background:var(--bg2);padding:12px 10px;text-align:center;
}
.stat-val{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.4rem;color:var(--text);line-height:1}
.stat-val.yellow{color:var(--y)}
.stat-val.green{color:var(--green)}
.stat-val.orange{color:var(--orange)}
.stat-lbl{font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ══ FILTER TABS ══ */
.ftabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.ftabs::-webkit-scrollbar{display:none}
.ftab{
  flex-shrink:0;padding:13px 18px;
  font-size:.67rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);background:none;border:none;cursor:pointer;
  position:relative;transition:color .2s;
  font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.ftab::after{
  content:'';position:absolute;bottom:0;left:50%;right:50%;
  height:2px;background:var(--y);transition:all .2s;
}
.ftab.active{color:var(--text)}
.ftab.active::after{left:12px;right:12px}
.ftab-count{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;
  font-size:.52rem;font-weight:800;margin-left:5px;
  background:var(--muted2);color:var(--muted);
  transition:all .2s;
}
.ftab.active .ftab-count{background:var(--y);color:var(--bg)}

/* ══ PEDIDOS LIST ══ */
.plist{
  padding:12px 12px 100px;
  max-width:680px;margin:0 auto;
}

/* ══ EMPTY STATE ══ */
.empty{
  text-align:center;padding:60px 20px;
}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:.4}
.empty-title{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.4rem;color:var(--muted);margin-bottom:6px}
.empty-sub{font-size:.75rem;color:var(--muted2)}

/* ══ PEDIDO CARD ══ */
.pcard{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:8px;
  overflow:hidden;
  transition:border-color .2s;
  position:relative;
}
.pcard.novo{border-color:rgba(255,208,0,.45);animation:cardIn .4s ease}
.pcard.preparo{border-color:rgba(255,140,0,.3)}
.pcard.pronto{border-color:rgba(29,185,84,.3);opacity:.75}
.pcard.entregue{opacity:.35}
@keyframes cardIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* STATUS STRIPE */
.pcard-stripe{
  height:3px;
  width:100%;
}
.pcard.novo .pcard-stripe{background:var(--y)}
.pcard.preparo .pcard-stripe{background:var(--orange)}
.pcard.pronto .pcard-stripe{background:var(--green)}
.pcard.entregue .pcard-stripe{background:var(--muted2)}

.pcard-body{padding:14px 16px 0}

/* CARD HEADER */
.pcard-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  margin-bottom:10px;
}
.pcard-num{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:1.6rem;color:var(--y);line-height:1;
}
.pcard-meta{flex:1}
.pcard-name{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:2px}
.pcard-time{font-size:.65rem;color:var(--muted);letter-spacing:.04em}
.pcard-time span{color:var(--text);font-weight:600}

/* STATUS BADGE */
.status-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:100px;
  font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  flex-shrink:0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.status-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;background:currentColor;
}
.status-badge.novo{background:rgba(255,208,0,.15);color:var(--y)}
.status-badge.preparo{background:rgba(255,140,0,.15);color:var(--orange)}
.status-badge.pronto{background:rgba(29,185,84,.15);color:var(--green)}
.status-badge.entregue{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* ITEMS */
.pcard-items{
  display:flex;flex-direction:column;gap:4px;
  padding:10px 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
}
.pitem{
  display:flex;align-items:center;gap:8px;
  font-size:.83rem;color:var(--text);
}
.pitem-qty{
  min-width:20px;
  background:var(--bg3);border-radius:5px;
  font-size:.68rem;font-weight:800;color:var(--y);
  text-align:center;padding:2px 5px;flex-shrink:0;
}
.pitem-name{flex:1;line-height:1.3}
.pitem-price{font-family:'DM Serif Display',serif;font-style:italic;font-size:.95rem;color:var(--muted);flex-shrink:0}

/* NOTES */
.pcard-obs{
  display:flex;gap:8px;align-items:flex-start;
  background:rgba(255,208,0,.05);border-radius:8px;
  padding:8px 10px;margin-bottom:12px;
  font-size:.75rem;color:var(--text);line-height:1.5;
}
.pcard-obs-icon{flex-shrink:0;margin-top:1px;color:var(--y)}

/* TOTAL + DELIVERY */
.pcard-total-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.pcard-delivery{
  display:flex;align-items:center;gap:5px;
  font-size:.68rem;font-weight:700;color:var(--muted);
}
.pcard-delivery.local{color:var(--blue)}
.pcard-delivery.entrega{color:var(--orange)}
.pcard-total{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:1.5rem;color:var(--text);
}

/* ACTION BUTTONS */
.pcard-actions{
  display:flex;gap:6px;padding:0 0 14px;
}
.pact{
  flex:1;padding:11px;border-radius:10px;
  font-size:.65rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  border:none;cursor:pointer;transition:all .18s;
  font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.pact:active{transform:scale(.95)}
.pact.next{background:var(--y);color:var(--bg)}
.pact.next.preparo{background:var(--orange);color:#fff}
.pact.next.pronto{background:var(--green);color:#fff}
.pact.wpp{background:var(--bg3);border:1px solid var(--border);color:var(--green)}
.pact.del{background:var(--bg3);border:1px solid var(--border);color:var(--muted);max-width:44px;padding:11px 0}

/* ══ NEW ORDER FAB ══ */
#fabNew{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:16px;
  width:52px;height:52px;border-radius:50%;
  background:var(--y);color:var(--bg);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:800;
  box-shadow:0 4px 24px rgba(255,208,0,.3);
  transition:all .2s;z-index:80;
  -webkit-tap-highlight-color:transparent;
}
#fabNew:active{transform:scale(.92)}

/* ══ NEW ORDER MODAL ══ */
#newOrderOverlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:none;align-items:flex-end;
}
#newOrderOverlay.open{display:flex}
#newOrderSheet{
  background:var(--bg2);
  border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:90svh;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.33,1,.68,1);
}
#newOrderOverlay.open #newOrderSheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--muted2);border-radius:4px;margin:12px auto 0;flex-shrink:0}
.sheet-scroll{overflow-y:auto;flex:1;padding:20px 18px 40px;scrollbar-width:thin;scrollbar-color:var(--muted2) transparent}
.sheet-title{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.3rem;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:14px}

.nfield{margin-bottom:14px}
.nfield label{display:block;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:700}
.ninput{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
  font-size:.88rem;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;outline:none;
  transition:border-color .2s;
}
.ninput:focus{border-color:var(--border2)}
.ninput::placeholder{color:var(--muted2)}
textarea.ninput{resize:vertical;min-height:68px;line-height:1.5}

.nrow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ITEMS BUILDER */
.items-builder{margin-bottom:14px}
.item-row{
  display:flex;gap:8px;align-items:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:8px 10px;
  margin-bottom:6px;
}
.item-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.84rem;font-family:'Plus Jakarta Sans',sans-serif}
.item-row input::placeholder{color:var(--muted2)}
.item-qty{
  width:32px;text-align:center;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;padding:4px;
  color:var(--y);font-weight:700;font-size:.82rem;
  font-family:'Plus Jakarta Sans',sans-serif;outline:none;
}
.item-price{
  width:60px;text-align:right;
  background:none;border:none;outline:none;
  color:var(--muted);font-size:.82rem;
  font-family:'DM Serif Display',serif;font-style:italic;
}
.item-del{background:none;border:none;color:var(--muted2);cursor:pointer;padding:4px;font-size:.9rem;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.item-del:active{color:var(--red)}
.btn-add-item{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:10px;
  font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;transition:all .2s;
  font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;
}
.btn-add-item:active{border-color:var(--border2);color:var(--text)}

.btn-save{
  width:100%;background:var(--y);color:var(--bg);
  border:none;border-radius:100px;padding:15px;
  font-size:.8rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;margin-top:6px;
  font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;
}
.btn-save:active{transform:scale(.97)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(30px);
  background:var(--bg2);border:1px solid var(--border2);border-radius:100px;
  padding:10px 22px;font-size:.75rem;font-weight:600;color:var(--text);
  z-index:9999;transition:all .3s;opacity:0;white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{border-color:rgba(29,185,84,.5);color:var(--green)}
#toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}

/* ══ NOTIFICATION PERMISSION BANNER ══ */
#notifBanner{
  background:rgba(255,208,0,.08);border-bottom:1px solid var(--border2);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  font-size:.75rem;color:var(--text);
}
#notifBanner button{
  background:var(--y);color:var(--bg);border:none;border-radius:100px;
  padding:6px 14px;font-size:.65rem;font-weight:700;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
#notifBanner button:active{transform:scale(.95)}

/* AUDIO PING */
#audioCtx{display:none}

/* ══ SOUND TOGGLE ══ */
.sound-toggle{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:100px;padding:5px 12px;
  font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;transition:all .2s;
  font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:5px;
}
.sound-toggle.on{border-color:var(--border2);color:var(--y)}
.sound-toggle:active{transform:scale(.93)}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-logo">Casa da <span>Sogra</span></div>
  <div class="login-sub">Painel de Pedidos</div>
  <div class="login-label">PIN de acesso</div>
  <div class="login-pin-row">
    <div class="pin-dot" id="ld0"></div>
    <div class="pin-dot" id="ld1"></div>
    <div class="pin-dot" id="ld2"></div>
    <div class="pin-dot" id="ld3"></div>
  </div>
  <div class="pin-grid">
    <button class="pkey" onclick="lp('1')">1</button>
    <button class="pkey" onclick="lp('2')">2</button>
    <button class="pkey" onclick="lp('3')">3</button>
    <button class="pkey" onclick="lp('4')">4</button>
    <button class="pkey" onclick="lp('5')">5</button>
    <button class="pkey" onclick="lp('6')">6</button>
    <button class="pkey" onclick="lp('7')">7</button>
    <button class="pkey" onclick="lp('8')">8</button>
    <button class="pkey" onclick="lp('9')">9</button>
    <button class="pkey" style="visibility:hidden"></button>
    <button class="pkey" onclick="lp('0')">0</button>
    <button class="pkey del" onclick="ld()">⌫</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">

  <!-- NOTIF BANNER -->
  <div id="notifBanner" style="display:none">
    <span>🔔 Ativar notificações para novos pedidos</span>
    <button onclick="askNotif()">Ativar</button>
    <button onclick="document.getElementById('notifBanner').style.display='none'" style="background:var(--muted2);color:var(--muted)">Depois</button>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">Casa da <span>Sogra</span></div>
    <div class="nav-date" id="navDate"></div>
    <div class="nav-live" id="navLive">
      <div class="live-dot"></div>
      <span>ao vivo</span>
    </div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="Som">🔔</button>
    <button class="nav-logout" onclick="logout()" title="Sair">✕</button>
  </nav>

  <!-- STATS -->
  <div class="statsbar">
    <div class="stat">
      <div class="stat-val yellow" id="stTotal">0</div>
      <div class="stat-lbl">Hoje</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stNovo">0</div>
      <div class="stat-lbl">Novos</div>
    </div>
    <div class="stat">
      <div class="stat-val orange" id="stPreparo">0</div>
      <div class="stat-lbl">Em preparo</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="stPronto">0</div>
      <div class="stat-lbl">Prontos</div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="ftabs">
    <button class="ftab active" onclick="setFilter('todos',this)">Todos <span class="ftab-count" id="cnt-todos">0</span></button>
    <button class="ftab" onclick="setFilter('novo',this)">Novos <span class="ftab-count" id="cnt-novo">0</span></button>
    <button class="ftab" onclick="setFilter('preparo',this)">Preparo <span class="ftab-count" id="cnt-preparo">0</span></button>
    <button class="ftab" onclick="setFilter('pronto',this)">Prontos <span class="ftab-count" id="cnt-pronto">0</span></button>
    <button class="ftab" onclick="setFilter('entregue',this)">Entregues <span class="ftab-count" id="cnt-entregue">0</span></button>
  </div>

  <!-- LIST -->
  <div class="plist" id="ordersList"></div>

  <!-- FAB -->
  <button id="fabNew" onclick="openNew()" title="Novo pedido manual">+</button>

</div>

<!-- ══ NEW ORDER MODAL ══ -->
<div id="newOrderOverlay" onclick="if(event.target===this)closeNew()">
  <div id="newOrderSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-title">+ Novo pedido manual</div>

      <div class="nfield">
        <label>Nome do cliente</label>
        <input class="ninput" id="nCliente" placeholder="Ex: Maria das Graças">
      </div>
      <div class="nrow2">
        <div class="nfield">
          <label>WhatsApp</label>
          <input class="ninput" id="nWpp" placeholder="44999999999" type="tel">
        </div>
        <div class="nfield">
          <label>Pagamento</label>
          <select class="ninput" id="nPagamento">
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="cartao">Cartão</option>
          </select>
        </div>
      </div>

      <div class="nfield">
        <label>Endereço (se entrega)</label>
        <input class="ninput" id="nEndereco" placeholder="Rua, número, bairro">
      </div>

      <!-- ITENS BUILDER -->
      <div class="items-builder">
        <div style="font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:700">Itens do pedido</div>
        <div id="itemsRows"></div>
        <button class="btn-add-item" onclick="addItemRow()">+ Adicionar item</button>
      </div>

      <div class="nfield">
        <label>Observações</label>
        <textarea class="ninput" id="nObs" placeholder="Sem cebola, mais arroz..."></textarea>
      </div>

      <button class="btn-save" id="btnSaveOrder" onclick="saveNewOrder()">Registrar pedido</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const SB_URL='https://nnnrnaxvghgbtqjlxjnk.supabase.co';
const SB_KEY='sb_publishable_4NneyQucsf6rHMQpF81IQw_LwMWyIEb';
const PIN='0402';
const WPP_LOJA='554497088509';

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let pedidos=[];
let filterAtual='todos';
let soundOn=true;
let pollTimer=null;
let lastSeenCount=0;
let pinBuf='';

// ══════════════════════════════════════
// SUPABASE HELPER
// ══════════════════════════════════════
async function sb(table,method='GET',body=null,qs=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${qs}`,{
    method,
    headers:{
      'apikey':SB_KEY,
      'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
      'Prefer':method==='POST'||method==='PATCH'?'return=representation':''
    },
    cache: 'no-store',
    body:body?JSON.stringify(body):undefined
  });
  if(r.status===204)return null;
  const d=await r.json();
  if(!r.ok)throw new Error(JSON.stringify(d));
  return d;
}

// ══════════════════════════════════════
// LOGIN
// ══════════════════════════════════════
function lp(k){
  if(pinBuf.length>=4)return;
  pinBuf+=k;
  updDots();
  if(pinBuf.length===4){
    setTimeout(()=>{
      if(pinBuf===PIN){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').style.display='block';
        initApp();
      }else{
        for(let i=0;i<4;i++){const d=document.getElementById('ld'+i);d.classList.add('err');d.classList.remove('filled')}
        setTimeout(()=>{for(let i=0;i<4;i++){const d=document.getElementById('ld'+i);d.classList.remove('err');}pinBuf='';updDots();},600);
      }
    },80);
  }
}
function ld(){pinBuf=pinBuf.slice(0,-1);updDots()}
function updDots(){for(let i=0;i<4;i++){const d=document.getElementById('ld'+i);if(d)pinBuf.length>i?d.classList.add('filled'):d.classList.remove('filled','err')}}

function logout(){
  clearInterval(pollTimer);
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  pinBuf='';updDots();
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
async function initApp(){
  setNavDate();
  addItemRow();
  await loadPedidos();
  startPolling();
  checkNotifPermission();
  loadSoundPref();
}

function setNavDate(){
  const d=new Date();
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('navDate').textContent=`${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]}`;
}

// ══════════════════════════════════════
// LOAD PEDIDOS
// ══════════════════════════════════════
async function loadPedidos(){
  const hoje = new Date().toISOString().split('T')[0];
  try{
    const data = await sb('orders','GET',null,`?order=created_at.desc`);
    
    // Filtra para exibir apenas pedidos concluídos e os que já estão no fluxo do painel (incluindo confirmed legado)
    const validStatuses = ['concluido', 'confirmed', 'preparo', 'pronto', 'entregue'];
    const filtered = (data || []).filter(p => p.status && validStatuses.includes(p.status.toLowerCase()));
    
    // Mapeia 'concluido' (e 'confirmed' antigo) → 'novo' para exibição
    const mapped = filtered.map(p => {
      const st = p.status.toLowerCase();
      return {
        ...p,
        status: (st === 'concluido' || st === 'confirmed') ? 'novo' : st
      };
    });
    
    // Logic to notify new entries
    const novos = mapped.filter(p => !pedidos.find(e => e.id === p.id));
    if(novos.length && pedidos.length > 0){
      novos.forEach(() => playPing());
      sendNotif(novos.length);
    }
    
    pedidos = mapped;
    render();
    updateStats();
    updateCounts();
    lastSeenCount = pedidos.length;
  }catch(e){
    if(pedidos.length === 0){ loadDemoData(); }
    console.warn('Supabase error:', e.message);
    setOffline();
  }
}

function setOffline(){
  const lv=document.getElementById('navLive');
  lv.style.color='var(--muted)';
  lv.querySelector('div').style.background='var(--muted)';
  lv.querySelector('div').style.animation='none';
  lv.querySelector('span').textContent='offline';
}

function loadDemoData(){
  const agora=new Date();
  const mktime=m=>new Date(agora-m*60000).toISOString();
  pedidos=[
    {id:'demo-1',numero:3,cliente:'Maria das Graças',wpp:'44999990001',tipo:'entrega',endereco:'Rua das Flores, 45',items:[{nome:'Marmita de Picanha',qty:1,preco:28.90},{nome:'Coca-Cola Lata',qty:2,preco:5.00}],obs:'Sem cebola por favor',status:'pronto',total:38.90,created_at:mktime(12)},
    {id:'demo-2',numero:4,cliente:'João Paulo',wpp:'44999990002',tipo:'local',endereco:'',items:[{nome:'Marmita Frango',qty:2,preco:16.90},{nome:'Suco Natural',qty:1,preco:7.00}],obs:'',status:'preparo',total:40.80,created_at:mktime(7)},
    {id:'demo-3',numero:5,cliente:'Ana Luiza',wpp:'44999990003',tipo:'local',endereco:'',items:[{nome:'Marmita de Costela',qty:1,preco:26.90}],obs:'Bem temperada!',status:'novo',total:26.90,created_at:mktime(2)},
  ];
  render();updateStats();updateCounts();
}

// ══════════════════════════════════════
// POLLING (5s interval)
// ══════════════════════════════════════
function startPolling(){
  clearInterval(pollTimer);
  pollTimer=setInterval(loadPedidos,5000);
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render(){
  const list=document.getElementById('ordersList');
  let items=pedidos;
  if(filterAtual!=='todos')items=pedidos.filter(p=>p.status===filterAtual);
  if(!items.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🍱</div><div class="empty-title">Nenhum pedido aqui</div><div class="empty-sub">Os pedidos aparecem em tempo real</div></div>`;
    return;
  }
  list.innerHTML=items.map(p=>cardHTML(p)).join('');
}

function cardHTML(p){
  const t=new Date(p.created_at);
  const timeStr=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  const elapsed=elapsedStr(t);
  const statusLabels={novo:'🟡 Novo',preparo:'🟠 Preparo',pronto:'🟢 Pronto',entregue:'✓ Entregue'};
  const nextLabels={novo:'Iniciar preparo',preparo:'Marcar como pronto',pronto:'Confirmar entrega',entregue:null};
  const nextClasses={novo:'next',preparo:'next preparo',pronto:'next pronto',entregue:null};
  // Se houver resumo_pedido da n8n ou da tabela orders, utiliza ele
  let itemsHTML = '';
  
  try {
    if (p.resumo_pedido) {
      if (typeof p.resumo_pedido === 'string') {
        itemsHTML = `<div class="pitem" style="white-space: pre-wrap; font-size: .8rem; line-height: 1.4; color: var(--text)">${p.resumo_pedido.replace(/\n/g, '<br>')}</div>`;
      } else if (typeof p.resumo_pedido === 'object') {
        // Pode ser o formato { pedido: { itens: [...] } }
        const lista = p.resumo_pedido.pedido?.itens || p.resumo_pedido.itens || [];
        if (lista.length > 0) {
          itemsHTML = lista.map(i => `
            <div class="pitem">
              <span class="pitem-qty">${i.quantidade || i.qty || 1}x</span>
              <span class="pitem-name">${i.nome || i.name}</span>
              <span class="pitem-price">${i.price ? 'R$'+((i.price||0)*(i.quantidade||i.qty||1)).toFixed(2).replace('.',',') : ''}</span>
            </div>
          `).join('');
        } else {
          itemsHTML = `<div class="pitem" style="white-space: pre-wrap; font-size: .8rem; line-height: 1.4; color: var(--text)">${JSON.stringify(p.resumo_pedido)}</div>`;
        }
      }
    }
  } catch (err) {}

  if (!itemsHTML) {
    itemsHTML = (p.items||[]).map(i=>`
      <div class="pitem">
        <span class="pitem-qty">${i.qty||1}x</span>
        <span class="pitem-name">${i.name}</span>
        <span class="pitem-price">R$${((i.price||0)*(i.qty||1)).toFixed(2).replace('.',',')}</span>
      </div>
    `).join('');
  }  
  const obsHTML=p.obs?`<div class="pcard-obs"><span class="pcard-obs-icon">💬</span>${p.obs}</div>`:'';
  const addressHTML=p.address 
    ?`<div class="pcard-delivery entrega">🛵 Entrega · ${p.address}</div>`
    :`<div class="pcard-delivery local">🏪 Retirada no local</div>`;
  
  const nextBtn=nextLabels[p.status]
    ?`<button class="pact ${nextClasses[p.status]}" onclick="nextStatus('${p.id}')">${nextLabels[p.status]}</button>`:'';
    
  const wppMsg=encodeURIComponent(`Olá ${p.customer_name}! Seu pedido #${p.order_number||''} da Casa da Sogra está ${p.status==='pronto'?'PRONTO para retirada!':'em preparação.'} 🍱`);
  
  return`<div class="pcard ${p.status}" id="card-${p.id}">
    <div class="pcard-stripe"></div>
    <div class="pcard-body">
      <div class="pcard-head">
        <div class="pcard-num">#${p.order_number||'—'}</div>
        <div class="pcard-meta">
          <div class="pcard-name">${p.customer_name||'Cliente'}</div>
          <div class="pcard-time">${timeStr} · <span>${elapsed}</span></div>
          <div style="font-size:.65rem; color:var(--y); margin-top:2px; font-weight:700">💳 ${p.payment_method?.toUpperCase() || 'N/A'}</div>
        </div>
        <div class="status-badge ${p.status}">${statusLabels[p.status]}</div>
      </div>
      <div class="pcard-items">${itemsHTML}</div>
      ${obsHTML}
      <div class="pcard-total-row">
        ${addressHTML}
        <div class="pcard-total">R$ ${(p.total||0).toFixed(2).replace('.',',')}</div>
      </div>
      <div class="pcard-actions">
        ${nextBtn}
        ${p.customer_phone?`<a class="pact wpp" href="https://wa.me/${p.customer_phone.replace(/\D/g,'')}?text=${wppMsg}" target="_blank">WPP</a>`:''}
        <button class="pact del" onclick="deletePedido('${p.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

function elapsedStr(d){
  const m=Math.floor((Date.now()-d)/60000);
  if(m<1)return'agora';if(m<60)return`${m}min`;
  const h=Math.floor(m/60);return`${h}h${m%60?m%60+'min':''}`;
}

// ══════════════════════════════════════
// STATS & COUNTS
// ══════════════════════════════════════
function updateStats(){
  document.getElementById('stTotal').textContent=pedidos.length;
  document.getElementById('stNovo').textContent=pedidos.filter(p=>p.status==='novo').length;
  document.getElementById('stPreparo').textContent=pedidos.filter(p=>p.status==='preparo').length;
  document.getElementById('stPronto').textContent=pedidos.filter(p=>p.status==='pronto').length;
}
function updateCounts(){
  const counts={todos:pedidos.length,novo:0,preparo:0,pronto:0,entregue:0};
  pedidos.forEach(p=>{if(counts[p.status]!==undefined)counts[p.status]++});
  Object.keys(counts).forEach(k=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=counts[k]});
}

// ══════════════════════════════════════
// FILTER
// ══════════════════════════════════════
function setFilter(f,el){
  filterAtual=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ══════════════════════════════════════
// NEXT STATUS
// ══════════════════════════════════════
const flow={novo:'preparo',preparo:'pronto',pronto:'entregue'};
async function nextStatus(id){
  const p=pedidos.find(x=>x.id===id);if(!p||!flow[p.status])return;
  const newStatus=flow[p.status];
  p.status=newStatus;
  render();updateStats();updateCounts();
  try{
    await sb('orders','PATCH',{status:newStatus},`?id=eq.${id}`);
    toast(`Pedido #${p.numero||''} → ${newStatus}`,'ok');
  }catch(e){toast('Erro ao salvar','err')}
}

// ══════════════════════════════════════
// DELETE
// ══════════════════════════════════════
async function deletePedido(id){
  if(!confirm('Remover este pedido?'))return;
  pedidos=pedidos.filter(p=>p.id!==id);
  render();updateStats();updateCounts();
  try{await sb('orders','DELETE',null,`?id=eq.${id}`);}
  catch(e){toast('Erro ao remover','err')}
}

// ══════════════════════════════════════
// NEW ORDER MODAL
// ══════════════════════════════════════
function openNew(){
  document.getElementById('newOrderOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeNew(){
  document.getElementById('newOrderOverlay').classList.remove('open');
  document.body.style.overflow='';
}

let itemRowCount=0;
function addItemRow(){
  itemRowCount++;
  const row=document.createElement('div');
  row.className='item-row';
  row.id='ir-'+itemRowCount;
  row.innerHTML=`
    <input type="number" class="item-qty" placeholder="1" min="1" value="1">
    <input type="text" class="in-name" placeholder="Nome do item (ex: Marmita de Frango)">
    <input type="number" class="in-price" placeholder="0,00" step="0.50" min="0">
    <button class="item-del" onclick="this.closest('.item-row').remove()">✕</button>
  `;
  document.getElementById('itemsRows').appendChild(row);
}

async function saveNewOrder(){
  const name=document.getElementById('nCliente').value.trim();
  const phone=document.getElementById('nWpp').value.trim();
  const payment=document.getElementById('nPagamento').value;
  const address=document.getElementById('nEndereco').value.trim();
  const obs=document.getElementById('nObs').value.trim();

  if(!name){toast('Informe o nome do cliente','err');return;}
  const rows=document.querySelectorAll('#itemsRows .item-row');
  const items=[];let total=0;
  rows.forEach(r=>{
    const qty=parseInt(r.querySelector('.item-qty').value)||1;
    const nameItem=r.querySelector('.in-name').value.trim();
    const price=parseFloat(r.querySelector('.in-price').value)||0;
    if(nameItem){items.push({name:nameItem,qty,price});total+=price*qty;}
  });

  if(!items.length){toast('Adicione pelo menos um item','err');return;}
  const btn=document.getElementById('btnSaveOrder');
  btn.disabled=true;btn.textContent='Salvando...';

  const payload = {
    customer_name: name,
    customer_phone: phone.replace(/\D/g,''),
    payment_method: payment,
    address: address,
    items: items,
    total: total,
    status: 'concluido'
  };

  try{
    await sb('orders','POST',payload);
    toast('Pedido registrado!','ok');
    closeNew();
    loadPedidos();
    // reset form
    document.getElementById('nCliente').value='';
    document.getElementById('nWpp').value='';
    document.getElementById('nEndereco').value='';
    document.getElementById('nObs').value='';
    document.getElementById('itemsRows').innerHTML='';
    itemRowCount=0;addItemRow();
    playPing();
  }catch(e){
    toast('Erro ao salvar','err');
  }
  btn.disabled=false;btn.textContent='Registrar pedido';
}

// ══════════════════════════════════════
// SOUND
// ══════════════════════════════════════
function playPing(){
  if(!soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,150,300].forEach((delay,i)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=[880,1100,1320][i];
      o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+delay/1000);
      g.gain.linearRampToValueAtTime(.25,ctx.currentTime+delay/1000+.02);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+delay/1000+.25);
      o.start(ctx.currentTime+delay/1000);
      o.stop(ctx.currentTime+delay/1000+.3);
    });
  }catch(e){}
}
function toggleSound(){
  soundOn=!soundOn;
  const btn=document.getElementById('soundToggle');
  btn.textContent=soundOn?'🔔':'🔕';
  btn.classList.toggle('on',soundOn);
  localStorage.setItem('cds-sound',soundOn?'1':'0');
}
function loadSoundPref(){
  const s=localStorage.getItem('cds-sound');
  if(s==='0'){soundOn=false;document.getElementById('soundToggle').textContent='🔕';}
  else{soundOn=true;document.getElementById('soundToggle').classList.add('on');}
}

// ══════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════
function checkNotifPermission(){
  if('Notification' in window&&Notification.permission==='default'){
    document.getElementById('notifBanner').style.display='flex';
  }
}
function askNotif(){
  Notification.requestPermission().then(p=>{
    document.getElementById('notifBanner').style.display='none';
    if(p==='granted')toast('Notificações ativadas! 🔔','ok');
  });
}
function sendNotif(n){
  if('Notification' in window&&Notification.permission==='granted'){
    new Notification(`🍱 ${n} novo${n>1?'s':''} pedido${n>1?'s':''}!`,{
      body:`Casa da Sogra · ${n} pedido${n>1?'s':''}`,
      icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍱</text></svg>'
    });
  }
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let _tt;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2800);
}

// ══════════════════════════════════════
// AUTO-REFRESH ELAPSED TIMES
// ══════════════════════════════════════
setInterval(()=>{
  document.querySelectorAll('.pcard-time span').forEach(el=>{
    const card=el.closest('.pcard');
    if(!card)return;
    const id=card.id.replace('card-','');
    const p=pedidos.find(x=>String(x.id)===id);
    if(p)el.textContent=elapsedStr(new Date(p.created_at));
  });
},30000);
</script>
